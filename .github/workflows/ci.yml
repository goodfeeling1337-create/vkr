# CI: автоматический прогон тестов при push и Pull Request в main.
# Включите в репозитории: Settings → Actions → General → разрешить workflows.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install -U pip setuptools wheel
          python -m pip install -r requirements-dev.txt
          python -m pip install -e .

      - name: Run tests
        run: python -m pytest
