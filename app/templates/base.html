<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% block title %}Проверка нормализации БД{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>
<header class="top">
  <div class="wrap">
    <a class="brand" href="/">Нормализация БД</a>
    <nav>
      {% if user is defined and user %}
        <span class="who">{{ user.username }} ({{ user.role.name }})</span>
        <a href="/logout">Выход</a>
      {% endif %}
    </nav>
  </div>
</header>
<main class="wrap">
  {% block content %}{% endblock %}
</main>
</body>
</html>
